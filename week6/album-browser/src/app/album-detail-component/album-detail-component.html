@if (album()) {
  <div class="detail-card">
    <h2>Album Details</h2>
    <div class="info-group">
      <p><strong>ID:</strong> {{ album()?.id }}</p>
      <p><strong>User ID:</strong> {{ album()?.userId }}</p>
    </div>

    <div class="edit-section">
      <input [(ngModel)]="album()!.title" placeholder="Edit title">
    </div>

    <div class="button-group">
      <button (click)="saveTitle()" class="btn-save">Save</button>
      <button (click)="goBack()" class="btn-back">Back</button>
      <button [routerLink]="['/albums', album()?.id, 'photos']" class="btn-view">View Photos</button>
    </div>
  </div>
} @else {
  <p>Loading album details...</p>
}
