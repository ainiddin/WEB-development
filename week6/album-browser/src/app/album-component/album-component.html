@if (loading()) {
  <p>Loading albums...</p>
} @else {
  <ul>
    @for (album of albums(); track album.id) {
      <li>
        <a [routerLink]="['/albums', album.id]">
          {{album.id}} - {{album.title}}
        </a>
        <button (click)="deleteAlbum(album.id, $event)">Delete</button>
      </li>
    }
  </ul>
}
