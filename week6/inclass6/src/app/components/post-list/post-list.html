<div class="list-container">
  <h2>Blog Posts</h2>

  @if (isLoading()) {
    <div class="loading">Loading posts...</div>
  } @else {
    <div class="posts-list">
      @for (post of posts(); track post.id) {
        <div class="post-item" [routerLink]="['/posts', post.id]">
          {{ post.title }}
        </div>
      }
    </div>
  }
</div>
