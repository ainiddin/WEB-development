<div class="product-card">
  <img [src]="getAllImages(product())[getIndex(product().id)]" [alt]="product().name" class="main-img">

  <div class="thumbs">
    @for(img of getAllImages(product()); track $index){
      <img class="thumb"
           [class.active]="$index === getIndex(product().id)"
           [src]="img" [alt]="product().name + ' thubnail ' + ($index +1)"
           (click)="setIndex(product().id, $index)">
    }
  </div>
  <h2 class="name">{{product().name}}</h2>
  <p class="desc">{{product().description}}</p>
  <h2 class="price"><b>{{product().price | number}} ₸</b></h2>
  <p class="rating">Rating: <b>{{product().rating}}</b> ⭐</p>

  <div class="btns">
    <button class="link" (click)="openLink(product().link)">Kaspi</button>
    <div class="communicate">
      <button (click)="shareOnWhatsApp(product().link)" class="what">WhatsApp</button>
      <button (click)="shareOnTelegram(product().link)" class="tele">Telegram</button>
    </div>
    <button (click)="onDeleteClick()" class="delete">Delete</button>
    <button (click)="onLikeClick()" class="like">{{product().likes}} ❤️</button>
  </div>


</div>
